name: Blutag Website CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Validate HTML files
        run: |
          echo "Checking for basic HTML syntax errors..."
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              # Basic check for opening and closing html tags
              if ! grep -q "<html" "$file" || ! grep -q "</html>" "$file"; then
                echo "Warning: $file might be missing html tags"
              fi
            fi
          done

      - name: Check for broken internal links
        run: |
          echo "Checking for common issues in HTML files..."
          find . -name "*.html" -type f -exec echo "Processing {}" \;

      - name: List static assets
        run: |
          echo "Static assets structure:"
          ls -lah assets/ || echo "No assets directory found"
          ls -lah docs/ || echo "No docs directory found"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.ACR_REGISTRY_NAME }}.azurecr.io/blutag-website
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in deployment
        run: |
          cd gitops/blutag-website
          IMAGE_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          sed -i "s|image: .*blutag-website:.*|image: ${{ secrets.ACR_REGISTRY_NAME }}.azurecr.io/blutag-website:${IMAGE_TAG}|g" deployment.yaml
          
      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update blutag-website image to ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push

